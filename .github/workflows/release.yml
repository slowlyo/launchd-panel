name: release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  APP_ARCHIVE_PREFIX: launchd-panel
  APP_BUILD_BUNDLE_NAME: launchd-panel
  APP_RELEASE_BUNDLE_NAME: Launchd Panel

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: 安装 Wails CLI
        shell: bash
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install "github.com/wailsapp/wails/v2/cmd/wails@$(go list -m -f '{{.Version}}' github.com/wailsapp/wails/v2)"

      - name: 注入版本号
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_VERSION#v}"
          node "./scripts/sync-version.mjs" "$VERSION"

      - name: 构建 macOS 应用
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_VERSION#v}"
          wails build -clean -platform darwin/universal -ldflags "-X main.appVersion=${VERSION}"

      - name: 打包 release 产物
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_NAME="${APP_ARCHIVE_PREFIX}_${VERSION}_darwin_universal.zip"
          STAGED_APP="release/${APP_RELEASE_BUNDLE_NAME}.app"
          mkdir -p release
          ditto "build/bin/${APP_BUILD_BUNDLE_NAME}.app" "${STAGED_APP}"
          ditto -c -k --sequesterRsrc --keepParent "${STAGED_APP}" "release/${ARCHIVE_NAME}"
          shasum -a 256 "release/${ARCHIVE_NAME}" > "release/${ARCHIVE_NAME}.sha256"

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release/*.zip
            release/*.sha256

      - name: 回写版本号到默认分支
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_VERSION#v}"
          git fetch origin "${DEFAULT_BRANCH}"
          git reset --hard
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"
          node "./scripts/sync-version.mjs" "$VERSION"

          if git diff --quiet -- "wails.json" "version.go"; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "wails.json" "version.go"
          git commit -m "chore: sync version to ${VERSION}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
